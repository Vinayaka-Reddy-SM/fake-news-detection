version: '3.8'
services:
  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/truthcheck
      - JWT_SECRET=supersecretkey123
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      - mongo
      - ml-service

  client:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - server

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
